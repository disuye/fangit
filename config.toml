# ─────────────────────────────────────────────────────────────────
# ── FANGIT config ────────────────────────────────────────────────
# https://github.com/disuye/fangit
# ─────────────────────────────────────────────────────────────────

[general]
# GitHub username to @mention in notifications
github_user = "disuye"

# Seconds before committing watched file changes (30-300)
batch_interval = 30

# Filesystem scan interval in seconds (10-300)
# Lower = faster detection, higher = less CPU
scan_interval = 30

# Tray icon style (default is dot):
# dot (color dot) | logo (logo + color dot) | tint (color logo)
tray_style = "tint"

[repo]
# Remote repository URL (HTTPS or SSH)
url = "https://github.com/disuye/disuyebot.git"

# Default branch
branch = "main"

# Auth method: "https" or "ssh"
auth = "https"


# ─────────────────────────────────────────────────────────────────
# ── Watch directories ────────────────────────────────────────────
# Watches a folder for new/changed files.
# action controls what happens:
#   "sync"          = git commit + push (default)
#   "channel_name"  = send notification via matching [[channel]]
# match is an optional regex filter — only act when new lines match.
# ─────────────────────────────────────────────────────────────────

[[watch]]
path_name = "Desktop Test"
path = "~/Desktop/fangit-test"
extensions = ["txt", "json"]
action = "log"

# Example: sync .txt files to git
# [[watch]]
# path_name = "SMPLR-recipes"
# path = "~/SMPLR/Stream"
# extensions = ["txt"]
# action = "sync"

# Example: notify on .log files, only when errors occur
# [[watch]]
# path_name = "SMPLR-errors"
# path = "~/SMPLR/Stream"
# extensions = ["log"]
# action = "error"
# match = "ERROR|FATAL|SIGPIPE"

# Example: notify on any log change, no filter
# [[watch]]
# path_name = "SMPLR-log"
# path = "~/SMPLR/Stream"
# extensions = ["log"]
# action = "log"

# Example: sync only when a regex matches
# [[watch]]
# path_name = "important-logs"
# path = "~/myapp/logs"
# extensions = ["log"]
# action = "sync"
# match = "CRITICAL|SHUTDOWN"


# ─────────────────────────────────────────────────────────────────
# ── Notification channels ────────────────────────────────────────
# Posts a message to a GitHub issue. No files, no git.
# mode: "dispatch" (via GitHub Action, ~35s) | "direct" (API, ~20s)
# action: "notify" | "notify+push"
# Emoji reference: 🔴🟠🟡🟢🔵🟣⚪⚫🟤
# ─────────────────────────────────────────────────────────────────

[[channel]]
path_name = "status"
issue = 1
emoji = "🟢"
mode = "dispatch"
action = "notify"

[[channel]]
path_name = "error"
issue = 2
emoji = "🔴"
mode = "dispatch"
action = "notify"

[[channel]]
path_name = "log"
issue = 3
emoji = "⚪"
mode = "dispatch"
action = "notify"

[[channel]]
path_name = "issue"
issue = 4
emoji = "🟡"
mode = "dispatch"
action = "notify"

# ─────────────────────────────────────────────────────────────────
