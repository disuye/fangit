# ─────────────────────────────────────────────────────────────────
# ── FANGIT config ────────────────────────────────────────────────
# https://github.com/disuye/fangit
# ─────────────────────────────────────────────────────────────────
#

[general]
# GitHub username to @mention in notifications
github_user = "disuye"

# Seconds before committing watched file changes (30-300)
batch_interval = 30

# Filesystem scan interval in seconds (10-300)
# Lower = faster detection, higher = less CPU
scan_interval = 30

# Tray icon style (default is dot): 
# dot (color dot) | logo (logo + color dot) | tint (color logo)
tray_style = "tint"

[repo]
# Remote repository URL (HTTPS or SSH)
url = "https://github.com/disuye/disuyebot.git"

# Default branch
branch = "main"

# Auth method: "https" or "ssh"
auth = "https"


# ─────────────────────────────────────────────────────────────────
# ── Watch directories ────────────────────────────────────────────
# Sync mode: watches a folder, commits + pushes changes to repo.
# Triggers iOS notification via GitHub Actions (~45-60s).
# ─────────────────────────────────────────────────────────────────
#

[[watch]]
path_name = "Desktop Test"
# emoji = "☠️"
path = "~/Desktop/fangit-test"
extensions = ["txt", "json"]
action = "sync"

# [[watch]]
# path_name = "Repo Folder Name"    # required — unique ID + repo subdirectory
# emoji = "📁"				        # optional
# path = "~/Desktop/path-to-watch"	# required – path to watch folder
# extensions = ["txt", "json"]  	# optional – which files trigger fangit
# action = "sync"                   # optional, "sync" [default; puhses watch folder 
                                    # up to git] | "path name" disables sync and sends
                                    # notification to [[channel]] matches "patch name"


# ─────────────────────────────────────────────────────────────────
# ── Notification channels ────────────────────────────────────────
# Notify mode: posts a message to a GitHub issue, no files involved.
# ─────────────────────────────────────────────────────────────────
#
# mode = "dispatch"  -> via GitHub Action, single account (~35s)
# mode = "direct"   -> direct API post, needs 2nd account (~20s)
# 🔴🟠🟡🟢🔵🟣⚪⚫🟤
# action = "notify"       -> notification only
# action = "notify+push"  -> notification + push push_dir to repo
# ─────────────────────────────────────────────────────────────────
#

[[channel]]
path_name = "status"       		# required — unique descriptive channel ID
issue = 1                  		# required – GitHub issue number to post to
emoji = "🟢"		   		# optional
mode = "dispatch"	   		# required – direct | dispatch
action = "notify"	   		# required – notify | notify+push

[[channel]]
path_name = "error"
issue = 2
emoji = "🔴"
mode = "dispatc"
action = "notify"

[[channel]]
path_name = "log"
issue = 3
emoji = "⚪"
mode = "dispatch"
action = "notify"

[[channel]]
path_name = "issue"
issue = 4
emoji = "🟡"
mode = "dispatch"
action = "notify"

# ─────────────────────────────────────────────────────────────────