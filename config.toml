# fangit configuration
# Place at: ~/Library/Application Support/fangit/config.toml

[general]
# GitHub username to @mention in push notifications
github_user = "disuye"

# Debounce interval in seconds before committing (30-300)
batch_interval = 60

# Filesystem scan interval in seconds (10-300)
# Lower = faster detection, higher = less CPU. 10 is for dev testing only.
scan_interval = 30

# Tray icon style: false = colored dot indicator, true = app icon with status tint
use_icon_logo = false

[repo]
# Remote repository URL (HTTPS or SSH)
url = "https://github.com/disuye/disuyebot.git"

# Local clone path (managed by fangit)
# Defaults to ~/Library/Application Support/fangit/repo
# local_path = ""

# Default branch
branch = "main"

# Auth method: "https" or "ssh"
auth = "https"

# Poll interval for pull/sync mode in seconds (future)
# poll_interval = 60

# Watch directories — one entry per monitored folder
# These trigger git commit + push when files change
[[watch]]
path_name = "SMPLR"
path = "~/fangit/SMPLR"
emoji = "🎵"
# Optional: only watch specific file extensions
# extensions = ["txt", "json", "log"]

[[watch]]
path_name = "SomeScript"
path = "~/fangit/SomeScript"
emoji = "📝"

# Notification channels — post directly to GitHub issues (no git, no files)
# Each channel maps to an issue number in the repo
#
# mode = "dispatch"  -> triggers GitHub Action, posts as github-actions[bot] (default)
#                       works with single account, ~35s latency
# mode = "direct"   -> posts issue comment via API
#                       faster (~20s) but needs a second GitHub account for notifications
#
# action = "notify"       -> notification only (default)
# action = "notify+push"  -> notification AND push push_dir to repo

[[channel]]
path_name = "status"
issue = 1
emoji = "🟢"
mode = "dispatch"
action = "notify"

[[channel]]
path_name = "errors"
issue = 2
emoji = "🔴"
mode = "dispatch"
action = "notify+push"
push_dir = "~/SMPLR/logs"

[[channel]]
path_name = "log"
issue = 3
emoji = "📝"
mode = "dispatch"
action = "notify"
